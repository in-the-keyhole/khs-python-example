# Convenience for `docker compose up` — same Dockerfile, dev-friendly defaults.
#
#   docker compose up --build        start the API
#   docker compose down              stop it
#   docker compose up --build -d     start in the background
#
# This bind-mounts ./app over the image's /app/app, so edits hot-reload
# without a rebuild. Tests, lint, etc. still run via uv on the host.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Throwaway Postgres for integration tests. Lives behind the `test` profile
  # so a plain `docker compose up` never starts it; the `poe test:int` task
  # brings it up and tears it down. Separate port (5433) so it never collides
  # with the dev `postgres` above, and tmpfs storage so data is in-memory,
  # fast, and wiped when the container stops — no leftover state between runs.
  postgres-test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 2s
      timeout: 3s
      retries: 15

  # Datadog Agent for the metrics demo. Behind the `observability` profile so a
  # plain `docker compose up` never starts it. It receives DogStatsD packets on
  # 8125/udp and forwards them to your Datadog account — so it needs YOUR API
  # key. Set it in the shell (or a .gitignored .env) before starting:
  #
  #   export DD_API_KEY=...          # from app.datadoghq.com → Organization Settings → API Keys
  #   docker compose --profile observability up -d datadog-agent
  #
  # Then run the app with metrics on (native dev talks to the published 8125):
  #   DD_METRICS_ENABLED=true uv run poe dev
  #
  # DD_API_KEY defaults to empty so this never breaks other compose commands;
  # without a real key the Agent runs but can't forward (it'll log auth errors).
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: ["observability"]
    environment:
      DD_API_KEY: "${DD_API_KEY:-}"
      DD_SITE: "${DD_SITE:-datadoghq.com}"
      # Accept DogStatsD from outside the container (the host app / the api service).
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_APM_ENABLED: "false"
    ports:
      - "8125:8125/udp"   # DogStatsD intake

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql+psycopg://app:app@postgres:5432/orders"
      # Metrics off by default; the agent host is pre-wired for when you turn it
      # on (run the api + datadog-agent together under the observability profile
      # with DD_METRICS_ENABLED=true).
      DD_METRICS_ENABLED: "${DD_METRICS_ENABLED:-}"
      DD_AGENT_HOST: "datadog-agent"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
